apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: influxdb
  namespace: influxdb
spec:
  interval: 10m
  chart:
    spec:
      chart: influxdb2
      version: "2.1.2"
      sourceRef:
        kind: HelmRepository
        name: influxdata
        namespace: flux-system
      interval: 1h
  values:
    adminUser:
      organization: "crulabs"
      bucket: "default"
      user: "admin"
      existingSecret: influxdb-auth

    persistence:
      enabled: true
      size: 100Gi
      storageClass: nfs-csi

    service:
      type: ClusterIP

    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 1Gi
        cpu: 500m
