apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
  namespace: rook-ceph
spec:
  interval: 30m
  dependsOn:
    - name: rook-ceph
      namespace: rook-ceph
  chart:
    spec:
      chart: rook-ceph-cluster
      version: "v1.19.6"
      sourceRef:
        kind: HelmRepository
        name: rook-release
        namespace: flux-system
  values:
    operatorNamespace: rook-ceph

    toolbox:
      enabled: true

    cephClusterSpec:
      dataDirHostPath: /var/lib/rook

      mon:
        count: 3
        allowMultiplePerNode: false
        volumeClaimTemplate:
          resources:
            requests:
              storage: 10Gi
          storageClassName: local-path
      mgr:
        count: 2

      dashboard:
        enabled: true
        ssl: false

      storage:
        useAllNodes: true
        useAllDevices: false
        devices:
          - name: "sdb"

      resources:
        mon:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 1Gi
        mgr:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 1Gi
        osd:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            memory: 2Gi

    monitoring:
      enabled: true
      createPrometheusRules: true

    cephBlockPools: []
    cephFileSystems: []
    cephObjectStores:
      - name: objectstore
        spec:
          metadataPool:
            replicated:
              size: 3
          dataPool:
            replicated:
              size: 3
          preservePoolsOnDelete: true
          gateway:
            port: 80
            instances: 2
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
        storageClass:
          enabled: true
          name: rook-ceph-bucket
          reclaimPolicy: Retain
