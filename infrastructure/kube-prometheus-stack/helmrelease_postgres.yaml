# infrastructure/ocirepositories/cnpg-cluster.yaml
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cnpg-cluster
  namespace: monitoring
spec:
  interval: 24h
  url: oci://ghcr.io/crulabs/charts/cnpg-cluster
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: copy
  ref:
    tag: "2.0.0"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-postgres
  namespace: monitoring
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: cnpg-cluster
    namespace: monitoring
  values:
    type: postgresql
    version: 17
    initdb:
      database: grafana
      secret:
        name: grafana

    affinity:
      enablePodAntiAffinity: true
