apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: flux-alerts
  namespace: flux-system
spec:
  groups:
    - name: flux
      rules:
        - alert: FluxHelmReleaseNotReady
          expr: gotk_resource_info{customresource_kind="HelmRelease",ready="False"} > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Flux HelmRelease not ready"
            description: "HelmRelease {{ $labels.name }} in {{ $labels.namespace }} is not ready."

        - alert: FluxKustomizationNotReady
          expr: gotk_resource_info{customresource_kind="Kustomization",ready="False"} > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Flux Kustomization not ready"
            description: "Kustomization {{ $labels.name }} in {{ $labels.namespace }} is not ready."

        - alert: FluxSourceNotReady
          expr: gotk_resource_info{customresource_kind=~"GitRepository|HelmRepository|OCIRepository|Bucket",ready="False"} > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Flux source not ready"
            description: "{{ $labels.kind }} {{ $labels.name }} in {{ $labels.namespace }} is not ready."
