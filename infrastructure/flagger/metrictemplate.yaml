---
apiVersion: flagger.app/v1beta1
kind: MetricTemplate
metadata:
  name: success-rate
  namespace: flagger-system
spec:
  provider:
    type: prometheus
    address: http://kube-prometheus-stack-prometheus.monitoring:9090
  query: |
    (
      sum(
        rate(traefik_service_requests_total{
          service=~"{{ namespace }}-{{ target }}-(primary|canary)-.*@kubernetesgateway",
          code!~"5.."
        }[{{ interval }}])
      )
      /
      sum(
        rate(traefik_service_requests_total{
          service=~"{{ namespace }}-{{ target }}-(primary|canary)-.*@kubernetesgateway"
        }[{{ interval }}])
      )
    ) * 100
---
apiVersion: flagger.app/v1beta1
kind: MetricTemplate
metadata:
  name: latency
  namespace: flagger-system
spec:
  provider:
    type: prometheus
    address: http://kube-prometheus-stack-prometheus.monitoring:9090
  query: |
    histogram_quantile(0.99,
      sum by (le) (
        rate(
          traefik_service_request_duration_seconds_bucket{
            service=~"{{ namespace }}-{{ target }}-.*-http-80@kubernetesgateway"
          }[{{ interval }}]
        )
      )
    ) * 1000
