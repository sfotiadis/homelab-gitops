---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zitadel
  namespace: zitadel
spec:
  interval: 30m
  dependsOn:
    - name: zitadel-postgres
      namespace: zitadel
  chart:
    spec:
      chart: zitadel
      version: "10.0.2"
      sourceRef:
        kind: HelmRepository
        name: zitadel
        namespace: flux-system
      interval: 24h
  values:
    zitadel:
      # Must be exactly 32 bytes. Use printable ASCII characters (alphanumeric).
      # Generate with: tr -dc A-Za-z0-9 </dev/urandom | head -c 32
      masterkeySecretName: zitadel-masterkey

      configmapConfig:
        ExternalDomain: zitadel.crulabs.intern
        ExternalSecure: true

        TLS:
          Enabled: false

        Database:
          Postgres:
            Host: zitadel-postgres-rw.zitadel.svc.cluster.local
            Port: 5432
            Database: zitadel
            User:
              Username: app
              SSL:
                Mode: disable
        
        FirstInstance:
          Org:
            Human:
              UserName: admin
              FirstName: Spiridon
              LastName: Fotiadis
              Email:
                Address: s.fot@live.com
                Verified: true
              Password: "Zitadel123!"
              PasswordChangeRequired: true

    gateway:
      httpRoute:
        enabled: true
        parentRefs:
        - name: crulabs-gateway
          sectionName: websecure
          namespace: gateway-system
        hostnames:
        - "zitadel.crulabs.intern"
        paths:
        - type: PathPrefix
          path: /

    login:
      enabled: true
      ingress:
        enabled: true
        className: traefik

    env:
      - name: ZITADEL_DATABASE_POSTGRES_USER_PASSWORD
        valueFrom:
          secretKeyRef:
            name: zitadel-db-credentials
            key: password

    initJob:
      command: "zitadel"