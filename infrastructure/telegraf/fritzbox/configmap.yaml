apiVersion: v1
kind: ConfigMap
metadata:
  name: fritzbox-telegraf
  namespace: monitoring
data:
  telegraf.conf: |
    [agent]
      interval          = "30s"
      round_interval    = true
      metric_batch_size = 1000
      metric_buffer_limit = 10000
      flush_interval    = "10s"
      hostname = "fritzbox-telegraf"
      omit_hostname = false

    [[inputs.fritzbox]]
      urls    = ["http://$FRITZ_USER:$FRITZ_PASS@$FRITZ_HOST:49000/"]
      collect = ["device", "wan", "wlan"]
      timeout = "10s"

    [[outputs.influxdb_v2]]
      urls = ["http://influxdb-influxdb2.influxdb.svc.cluster.local:80"]
      token = "${INFLUXDB_TOKEN}"
      organization = "crulabs"
      bucket = "fritzbox"
