apiVersion: v1
kind: ConfigMap
metadata:
  name: shelly-telegraf
  namespace: shelly
data:
  telegraf.conf: |
    [agent]
      interval = "10s"
      round_interval = true
      metric_batch_size = 1000
      metric_buffer_limit = 10000
      collection_jitter = "0s"
      flush_interval = "10s"
      flush_jitter = "0s"
      precision = ""
      hostname = "shelly-telegraf"
      omit_hostname = true

    [[outputs.postgresql]]
      connection="postgres://${TIMESCALE_USERNAME}:${TIMESCALE_PASSWORD}@timescaledb-rw.shelly.svc.cluster.local:5432/shelly"

      tags_as_foreign_keys = false
      create_templates = [
        '''CREATE TABLE IF NOT EXISTS {{ .table }} ({{ .columns }})''',
        '''SELECT create_hypertable('{{ .table }}', 'time', if_not_exists => TRUE)'''
      ]

    [[inputs.http]]
      urls = ["${SHELLY_URL}"]
      interval = "10s"
      timeout = "10s"
      method = "GET"
      data_format = "json_v2"

      [inputs.http.tags]
        url = ""

      [[inputs.http.json_v2]]
        measurement_name = "shelly"

        [[inputs.http.json_v2.field]]
          path = "switch:0.apower"
          rename = "power_watts"
          type = "float"

        [[inputs.http.json_v2.field]]
          path = "switch:0.voltage"
          rename = "voltage_volts"
          type = "float"

        [[inputs.http.json_v2.field]]
          path = "switch:0.current"
          rename = "current_amps"
          type = "float"

        [[inputs.http.json_v2.field]]
          path = "switch:0.aenergy.total"
          rename = "energy_wh"
          type = "float"

        [[inputs.http.json_v2.tags]]
          device = "proxmox-server"
          location = "homelab"
