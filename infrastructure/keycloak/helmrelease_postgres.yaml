# infrastructure/ocirepositories/cnpg-cluster.yaml
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cnpg-cluster
  namespace: keycloak
spec:
  interval: 24h
  url: oci://ghcr.io/crulabs/charts/cnpg-cluster
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: copy
  ref:
    tag: "2.0.0"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak-postgres
  namespace: keycloak
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: cnpg-cluster
    namespace: keycloak
  values:
    type: postgresql
    version: 17
    initdb:
      database: keycloak
      secret:
        name: keycloak-db-credentials

    storage:
      size: 10Gi

    backup:
      enabled: false
      obc:
        name: keycloak-postgres-backups
    affinity:
      enablePodAntiAffinity: true
