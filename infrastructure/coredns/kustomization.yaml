apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

patches:
  - target:
      kind: Deployment
      name: coredns
      namespace: kube-system
    patch: |-
      - op: add
        path: /metadata/labels/app.kubernetes.io~1name
        value: "coredns"
      - op: add 
        path: /metadata/labels/app.kubernetes.io~1instance
        value: "coredns"
