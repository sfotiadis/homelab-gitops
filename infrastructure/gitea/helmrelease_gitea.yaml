---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea
  namespace: gitea
spec:
  interval: 30m
  dependsOn:
    - name: gitea-postgres
      namespace: gitea
  chart:
    spec:
      chart: gitea
      version: "12.4.0"
      sourceRef:
        kind: HelmRepository
        name: gitea
        namespace: flux-system
      interval: 24h
  values:
    persistence:
      enabled: true
      size: 10Gi

    postgresql:
      enabled: false
    postgresql-ha:
      enabled: false

    gitea:
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
      additionalConfigFromEnvs:
        - name: GITEA__DATABASE__PASSWD
          valueFrom:
            secretKeyRef:
              name: gitea-db-credentials
              key: password
      config:
        server:
          DOMAIN: "gitea.crulabs.intern"
          ROOT_URL: "https://gitea.crulabs.intern"
          LANDING_PAGE: login
        database:
          DB_TYPE: postgres
          HOST: "gitea-postgres-rw.gitea.svc.cluster.local:5432"
          NAME: gitea
          USER: app
