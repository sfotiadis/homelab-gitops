apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: homer
resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - httproute.yaml

configMapGenerator:
  - name: homer-html
    namespace: homer
    files:
      - index.html=html/index.html

generatorOptions:
  disableNameSuffixHash: true