apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  interval: 30m
  chart:
    spec:
      chart: kyverno
      version: 3.7.1
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
  values:
    admissionController:
      deployment:  
        labels:
          app.kubernetes.io/name: kyverno
          app.kubernetes.io/instance: admission-controller
      replicas: 1
      resources:
        limits:
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 256Mi
    
    backgroundController:
      labels:
        app.kubernetes.io/name: kyverno
        app.kubernetes.io/instance: background-controller
      enabled: true
      resources:
        limits:
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 256Mi
    
    cleanupController:
      labels:
        app.kubernetes.io/name: kyverno
        app.kubernetes.io/instance: cleanup-controller
      enabled: true
      resources:
        limits:
          memory: 256Mi
        requests:
          cpu: 50m
          memory: 128Mi
    
    reportsController:
      labels:
        app.kubernetes.io/name: kyverno
        app.kubernetes.io/instance: reports-controller
      enabled: true
      resources:
        limits:
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 256Mi
