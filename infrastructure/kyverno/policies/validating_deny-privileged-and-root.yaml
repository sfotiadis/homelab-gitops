apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: deny-privileged-and-root
  annotations:
    policies.kyverno.io/title: Deny Privileged and Root Containers
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Privileged containers and containers running as root are not allowed.
      All containers must set privileged to false and run as a non-root user.
spec:
  validationActions: 
    - Deny
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        operations: ["CREATE", "UPDATE"]
    namespaceSelector:
      matchExpressions:
        - key: "kubernetes.io/metadata.name"
          operator: NotIn
          values: ["kube-system", "rook-ceph"]
  validations:
    - message: "Privileged containers are not allowed"
      expression: >-
        object.spec.containers.all(container,
          !has(container.securityContext) ||
          !has(container.securityContext.privileged) ||
          container.securityContext.privileged == false
        ) &&
        (!has(object.spec.initContainers) ||
          object.spec.initContainers.all(container,
            !has(container.securityContext) ||
            !has(container.securityContext.privileged) ||
            container.securityContext.privileged == false
          )
        ) &&
        (!has(object.spec.ephemeralContainers) ||
          object.spec.ephemeralContainers.all(container,
            !has(container.securityContext) ||
            !has(container.securityContext.privileged) ||
            container.securityContext.privileged == false
          )
        )
    - message: "Running as root is not allowed"
      expression: >-
        object.spec.containers.all(container,
          !has(container.securityContext) ||
          (!has(container.securityContext.runAsNonRoot) ||
            container.securityContext.runAsNonRoot == true) &&
          (!has(container.securityContext.runAsUser) ||
            container.securityContext.runAsUser > 0)
        ) &&
        (!has(object.spec.initContainers) ||
          object.spec.initContainers.all(container,
            !has(container.securityContext) ||
            (!has(container.securityContext.runAsNonRoot) ||
              container.securityContext.runAsNonRoot == true) &&
            (!has(container.securityContext.runAsUser) ||
              container.securityContext.runAsUser > 0)
          )
        ) &&
        (!has(object.spec.ephemeralContainers) ||
          object.spec.ephemeralContainers.all(container,
            !has(container.securityContext) ||
            (!has(container.securityContext.runAsNonRoot) ||
              container.securityContext.runAsNonRoot == true) &&
            (!has(container.securityContext.runAsUser) ||
              container.securityContext.runAsUser > 0)
          )
        ) 
