apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-latest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-app
  template:
    metadata:
      labels:
        app: test-app
    spec:
      containers:
      - name: app
        image: nginx:latest
---
