apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: tenant-access
  namespace: flux-system
spec:
  interval: 10m
  url: oci://ghcr.io/crulabs/charts/tenant-access
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: copy
  ref:
    tag: "0.1.1"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tenant-access
  namespace: tenant-access
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: tenant-access
    namespace: flux-system
  values:
    teams:
      - name: platform
        namespaces:
          - batch

    users:
      - name: test-user
        teams:
          - platform
