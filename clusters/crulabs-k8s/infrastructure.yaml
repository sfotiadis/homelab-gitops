apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: homelab-gitops
  path: ./infrastructure
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg

  patches:
    - target:
        kind: Deployment
        name: coredns
        namespace: kube-system
      patch: |-
        - op: add
          path: /metadata/labels/app.kubernetes.io~1name
          value: "coredns"
        - op: add 
          path: /metadata/labels/app.kubernetes.io~1instance
          value: "coredns"
