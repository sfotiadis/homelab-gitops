---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: example
  namespace: flux-system
spec:
  interval: 5m
  chart:
    spec:
      chart: ./tenant
      sourceRef:
        kind: GitRepository
        name: crulabs-helm
        namespace: flux-system
  values:
    namespace: example
    team: team-a

    ResourceQuota:
      requests:
        cpu: "1"
        memory: "1Gi"
        storage: "10Gi"
      limits:
        cpu: "2"
        memory: "2Gi"
      pods: "20"

    repository:
      kind: GitRepository
      url: https://github.com/org/repository
      branch: main
      path: ./
      secretref:
        name: git-credentials
    
    extraSubjects:
      - my-team # for an existing team serviceaccount
