apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: batch-https
  namespace: batch
spec:
  provider: traefik

  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: batch

  progressDeadlineSeconds: 120

  service:
    port: 80
    targetPort: 80
    hosts:
      - batch.crulabs.io
    gatewayRefs:
      - name: public-gateway
        namespace: gateway-system
        sectionName: websecure

  analysis:
    interval: 1m
    threshold: 5
    maxWeight: 50
    stepWeight: 10

    metrics:
      - name: request-success-rate
        interval: 1m
        thresholdRange:
          min: 0.99
        query: |
          sum(rate(traefik_service_requests_total{service=~"batch.*", code!~"5.."}[5m]))
          /
          clamp_min(sum(rate(traefik_service_requests_total{service=~"batch.*"}[5m])), 1)

      - name: request-duration
        interval: 1m
        thresholdRange:
          max: 500
        query: |
          histogram_quantile(
            0.99,
            sum(rate(traefik_entrypoint_request_duration_seconds_bucket{entrypoint=~".*"}[5m])) by (le)
          ) * 1000

    webhooks:
      - name: load-test
        type: pre-rollout
        url: http://flagger-loadtester.flagger-system/test
        timeout: 10s
        metadata:
          cmd: "hey -z 5m -q 30 -c 10 http://batch.crulabs.io/"
