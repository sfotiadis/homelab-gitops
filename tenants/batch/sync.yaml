# tenants/batch/sync.yaml
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: batch-repo
  namespace: batch
spec:
  interval: 10m
  url: https://github.com/crulabs/batch
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: batch
  namespace: batch
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: batch-repo
  path: ./
  prune: true
  targetNamespace: batch
  serviceAccountName: batch