# tenants/batch/sync.yaml
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: batch-repo
  namespace: flux-system
spec:
  interval: 10m
  url: ssh://git@github.com/crulabs/batch
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tenant-batch
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: batch-repo
  path: ./
  prune: true
  targetNamespace: batch
  serviceAccountName: batch