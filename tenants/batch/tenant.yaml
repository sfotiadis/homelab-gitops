---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: batch
  namespace: flux-system
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: tenant
    namespace: flux-system
  values:
    namespace: batch
    team: platform

    ResourceQuota:
      requests:
        cpu: "2"
        memory: "3Gi"
        storage: "10Gi"
      limits:
        cpu: "4"
        memory: "6Gi"
      pods: "20"

    repository:
      kind: GitRepository
      url: https://github.com/crulabs/batch
      branch: main
      path: ./overlays/production
      interval: 1m

    networkPolicy:
      endpointSelector: {}
      ingress:
        - fromEndpoints:
            - matchLabels:
                k8s:io.kubernetes.pod.namespace: gateway-system
        - fromEndpoints:
            - matchLabels:
                io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: cnpg-system
        - fromEndpoints:
            - matchLabels:
                io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: monitoring
        - fromEndpoints:
            - matchLabels:
                k8s:io.kubernetes.pod.namespace: batch
                app.kubernetes.io/managed-by: cloudnative-pg
          toPorts:
            - ports:
                - port: "5432"
                  protocol: TCP
                - port: "5433"
                  protocol: TCP
                - port: "8000"
                  protocol: TCP
      egress:
        - toEndpoints:
            - matchLabels:
                io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: cnpg-system
        - toEndpoints:
            - matchLabels:
                k8s:io.kubernetes.pod.namespace: rook-ceph
                app: rook-ceph-rgw
          toPorts:
            - ports:
                - port: "80"
                  protocol: TCP
                - port: "8080"
                  protocol: TCP
        - toEndpoints:
            - matchLabels:
                k8s:io.kubernetes.pod.namespace: batch
                app.kubernetes.io/managed-by: cloudnative-pg
          toPorts:
            - ports:
                - port: "5432"
                  protocol: TCP
                - port: "5433"
                  protocol: TCP
                - port: "8000"
                  protocol: TCP
