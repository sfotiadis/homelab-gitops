---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: batch
  namespace: flux-system
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: tenant
    namespace: flux-system
  values:
    namespace: batch
    team: platform

    ResourceQuota:
      requests:
        cpu: "1"
        memory: "1Gi"
        storage: "10Gi"
      limits:
        cpu: "2"
        memory: "2Gi"
      pods: "20"

    repository:
      kind: GitRepository
      url: https://github.com/crulabs/batch
      branch: main
      path: ./overlays/production
      interval: 1m

    networkPolicy:
      endpointSelector: {}
      ingress:
        # Allow inbound traffic from Traefik Gateway (HTTPRoute)
        - fromEndpoints:
            - matchLabels:
                k8s:io.kubernetes.pod.namespace: gateway-system
      egress:
        # Allow outbound traffic to Ceph RGW for S3 backups (CNPG barman)
        - toEndpoints:
            - matchLabels:
                k8s:io.kubernetes.pod.namespace: rook-ceph
                app: rook-ceph-rgw
          toPorts:
            - ports:
                - port: "80"
                  protocol: TCP
