---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: batch
  namespace: flux-system
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: tenant
    namespace: flux-system
  values:
    namespace: batch
    team: platform

    ResourceQuota:
      requests:
        cpu: "2"
        memory: "3Gi"
        storage: "10Gi"
      limits:
        cpu: "4"
        memory: "6Gi"
      pods: "20"

    repository:
      kind: GitRepository
      url: https://github.com/crulabs/batch
      branch: main
      path: ./overlays/production
      interval: 1m

    networkPolicy:
      endpointSelector: {}
      ingress: []
      egress: []
